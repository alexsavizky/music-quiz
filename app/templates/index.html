<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spotify Quiz - Main Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white min-h-screen p-8">
    <header
      class="flex justify-between items-center mb-12 border-b border-gray-800 pb-6"
    >
      <h1 class="text-4xl font-black text-green-500 tracking-tighter">
        MUS!C QU!Z
      </h1>

      <a
        href="/profile"
        class="flex items-center space-x-4 hover:bg-gray-800 p-2 rounded-full transition"
      >
        <span class="font-bold text-lg hidden md:block">{{ user_name }}</span>
        <img
          src="{{ user_img }}"
          alt="Profile"
          class="w-12 h-12 rounded-full border-2 border-green-500 shadow-lg"
        />
      </a>
    </header>

    <main class="max-w-6xl mx-auto space-y-12">
      <section>
        <h2 class="text-2xl font-bold mb-6 flex items-center">
          <span class="mr-2">✨</span> Personalized for You
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <a
            href="/game"
            class="group relative overflow-hidden rounded-xl bg-gray-800 aspect-video flex items-center justify-center border-2 border-transparent hover:border-green-500 transition-all shadow-xl"
          >
            <div
              class="absolute inset-0 bg-gradient-to-t from-black to-transparent opacity-60"
            ></div>
            <div class="relative text-center p-4">
              <h3
                class="text-2xl font-black group-hover:scale-110 transition-transform"
              >
                NAME THAT TUNE
              </h3>
              <p class="text-sm text-gray-300">Using your top artists</p>
            </div>
          </a>

          <div
            class="rounded-xl bg-gray-800 opacity-30 aspect-video flex items-center justify-center border-2 border-dashed border-gray-600"
          >
            <p class="font-bold italic">More coming soon...</p>
          </div>
        </div>
      </section>

      <section>
        <h2 class="text-2xl font-bold mb-6 flex items-center">
          <span class="mr-2">🌍</span> Global Challenges
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div
            class="rounded-xl bg-gray-800 opacity-50 aspect-video flex items-center justify-center border-2 border-gray-700"
          >
            <div class="text-center">
              <h3 class="text-xl font-bold text-gray-400">80s HITS QUIZ</h3>
              <p class="text-xs">Locked</p>
            </div>
          </div>
          <div
            class="rounded-xl bg-gray-800 opacity-50 aspect-video flex items-center justify-center border-2 border-gray-700"
          >
            <div class="text-center">
              <h3 class="text-xl font-bold text-gray-400">HIP HOP HEADS</h3>
              <p class="text-xs">Locked</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

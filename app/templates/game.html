<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Spotify Music Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
  </head>
  <body
    class="bg-gray-900 text-white flex flex-col items-center justify-center min-h-screen"
    id="game-container"
    data-token="{{ token }}"
  >
    <div
      id="game-hud"
      class="hidden flex justify-between w-full max-w-md mb-6 px-4 text-xl font-bold"
    >
      <div id="lives-display" class="text-red-500">❤️❤️</div>
      <div id="round-display">Round 1/5</div>
    </div>

    <h1 id="question-text" class="text-3xl font-bold mb-8 text-center px-4">
      Loading Quiz...
    </h1>

    <div
      id="media-box"
      class="w-64 h-64 bg-gray-800 rounded-lg flex items-center justify-center mb-8 shadow-xl border-4 border-gray-700"
    >
      <div id="music-icon" class="text-6xl animate-pulse">🎵</div>
    </div>

    <div class="flex items-center space-x-4 mb-8 w-full max-w-xs">
      <span>🔈</span>
      <input
        type="range"
        id="volume-control"
        min="0"
        max="100"
        value="50"
        class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-green-500"
      />
      <span>🔊</span>
    </div>

    <div
      id="options-container"
      class="grid grid-cols-2 gap-4 w-full max-w-md px-4"
    ></div>

    <div
      id="start-overlay"
      class="fixed inset-0 bg-black bg-opacity-95 z-50 flex flex-col items-center justify-center"
    >
      <h2 id="overlay-title" class="text-4xl font-bold mb-6">Music Quiz</h2>
      <p id="overlay-msg" class="mb-8 text-gray-400">
        5 Songs. 2 Lives. Can you win?
      </p>
      <button
        id="start-btn"
        class="hidden bg-green-500 hover:bg-green-400 text-black font-bold py-4 px-12 rounded-full text-2xl transition-all hover:scale-110"
      >
        START GAME
      </button>
      <div id="loading-msg" class="text-green-500 font-mono">
        Initializing Spotify...
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/quiz.js') }}"></script>
  </body>
</html>
